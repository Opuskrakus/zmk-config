# Configuration options for Preonic Rev 3

# Fix NVIC priority bits mismatch for Zephyr 4.x
CONFIG_NUM_IRQ_PRIO_BITS=4

# Uncomment to enable Bluetooth features
# CONFIG_BT=y
# CONFIG_ZMK_BLE=y

# # Enable deep sleep to save battery
# CONFIG_ZMK_SLEEP=y

# Uncomment to enable RGB underglow if your Preonic has it
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment to enable OLED display if needed
# CONFIG_ZMK_DISPLAY=y
