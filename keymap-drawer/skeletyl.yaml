layout: {ortho_layout: {split: true, rows: 3, columns: 5, thumbs: 3}}
layers:
  default:
  - [Q, W, E, R, T, Y, U, I, O, P]
  - - {t: A, h: LGUI}
    - {t: S, h: LALT}
    - {t: D, h: LCTRL}
    - {t: F, h: LSHFT}
    - G
    - H
    - {t: J, h: RSHFT}
    - {t: K, h: RCTRL}
    - {t: L, h: RALT}
    - {t: ;, h: RGUI}
  - [Z, X, C, V, B, N, M, ',', ., /]
  - - {t: TAB, h: fn}
    - {t: ↻, h: LSHFT, s: CAPS}
    - {t: BSPC, h: nav}
    - SPACE
    - {t: NUM, h: num}
    - RET
  nav:
  - - Alt+F4
    - {t: ▽, type: trans}
    - Sft+TAB
    - {t: Alt-Tab, h: swap}
    - {t: ▽, type: trans}
    - HOME
    - PG DN
    - PG UP
    - END
    - INS
  - [Gui+5, Gui+4, Gui+3, Gui+2, Gui+1, LEFT, DOWN, UP, RIGHT, '''']
  - - {t: LGUI, h: sticky}
    - {t: LALT, h: sticky}
    - {t: LCTRL, h: sticky}
    - {t: LSHFT, h: sticky}
    - {t: ▽, type: trans}
    - \
    - '|'
    - '~'
    - $
    - '%'
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: CANCEL, type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  fn:
  - [F1, F2, F3, F4, F5, F6, F7, F8, F9, F10]
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - F11
    - F12
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  - - OUT USB
    - OUT BLE
    - {t: BT, h: '0'}
    - {t: BT, h: '1'}
    - {t: BT, h: '2'}
    - {t: BT, h: '3'}
    - BT CLR
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  - - {type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  num:
  - - {t: ▽, type: trans}
    - '7'
    - '8'
    - '9'
    - {t: ▽, type: trans}
    - '!'
    - '@'
    - '#'
    - $
    - '%'
  - - {t: ▽, type: trans}
    - '4'
    - '5'
    - '6'
    - {t: ▽, type: trans}
    - '?'
    - '&'
    - '*'
    - (
    - )
  - ['0', '1', '2', '3', '0', '-', +, '=', _, ^]
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {type: held}
    - {t: ▽, type: trans}
  sys:
  - - {t: BT, h: '0'}
    - {t: BT, h: '1'}
    - {t: BT, h: '2', type: held}
    - {t: BT, h: '3'}
    - {t: BT CLR, type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - BOOT
    - BOOT
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - RESET
    - RESET
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  mouse:
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - PG UP
    - '&mmv MOVE_UP'
    - PG DN
    - {t: ▽, type: trans}
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - '&msc SCRL_LEFT'
    - '&mmv MOVE_LEFT'
    - '&mmv MOVE_DOWN'
    - '&mmv MOVE_RIGHT'
    - '&msc SCRL_RIGHT'
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - '&mkp LCLK'
    - '&mkp MCLK'
    - '&mkp RCLK'
    - {t: ▽, type: trans}
  - - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - '&msc SCRL_UP'
    - '&msc SCRL_DOWN'
